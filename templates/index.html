<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Company Tracker</title>
<style>
  :root {
    --bg: #f0f4f8;
    --card: #ffffff;
    --primary: #0a66c2;
    --primary-light: #e8f0fe;
    --border: #d1dbe8;
    --text: #1a1a2e;
    --muted: #6b7a99;
    --radius: 10px;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

  /* ── Header ── */
  header {
    background: var(--primary);
    color: #fff;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 1.25rem; font-weight: 700; }
  header span { font-size: 0.85rem; opacity: 0.8; margin-left: auto; }

  /* ── Stats bar ── */
  .stats { display: flex; gap: 14px; padding: 20px 28px 0; flex-wrap: wrap; }
  .stat-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 20px;
    box-shadow: var(--shadow);
    min-width: 130px;
    flex: 1;
  }
  .stat-card .value { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
  .stat-card .label { font-size: 0.75rem; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }

  /* ── Filters ── */
  .filters {
    background: var(--card);
    margin: 20px 28px 0;
    border-radius: var(--radius);
    padding: 16px 20px;
    box-shadow: var(--shadow);
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: flex-end;
  }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: 0.72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .filter-group input,
  .filter-group select {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 0.85rem;
    background: #fff;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .filter-group input:focus,
  .filter-group select:focus { border-color: var(--primary); }
  #search { width: 220px; }
  .score-wrap { display: flex; gap: 8px; align-items: center; }
  .score-wrap input[type=number] { width: 60px; }
  .btn-reset {
    padding: 7px 16px;
    background: var(--primary-light);
    color: var(--primary);
    border: 1px solid var(--primary);
    border-radius: 6px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
    align-self: flex-end;
  }
  .btn-reset:hover { background: #cfe0fc; }

  /* ── Result count ── */
  .result-info {
    padding: 12px 28px 0;
    font-size: 0.82rem;
    color: var(--muted);
  }

  /* ── Table ── */
  .table-wrap {
    margin: 10px 28px 28px;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: auto;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
  thead th {
    background: #f7faff;
    padding: 11px 14px;
    text-align: left;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: var(--primary); }
  thead th.sorted { color: var(--primary); }
  thead th .sort-arrow { margin-left: 4px; opacity: 0.5; }
  thead th.sorted .sort-arrow { opacity: 1; }
  tbody tr { border-bottom: 1px solid #eef2f7; transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f7faff; }
  td { padding: 10px 14px; vertical-align: middle; }

  /* name cell */
  .name-cell a { color: var(--primary); text-decoration: none; font-weight: 600; }
  .name-cell a:hover { text-decoration: underline; }
  .name-cell .sub { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .field-badge {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    background: #e0ecff;
    color: #1a5fa8;
    margin-bottom: 4px;
  }

  /* score */
  .score-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-weight: 700;
    font-size: 0.9rem;
    color: #fff;
  }
  .score-low    { background: #e74c3c; }
  .score-mid    { background: #e67e22; }
  .score-good   { background: #27ae60; }
  .score-high   { background: #1a8a4a; }

  /* needs tags */
  .tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 20px;
    background: #eef2ff;
    color: #3730a3;
    white-space: nowrap;
  }

  /* status dropdown */
  .status-select {
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    outline: none;
    background: #fff;
    transition: border-color .15s, background .15s;
    min-width: 130px;
  }
  .status-select:focus { border-color: var(--primary); }
  .status-select.s-new           { background: #f0f4ff; color: #3730a3; border-color: #c7d2fe; }
  .status-select.s-contacted     { background: #fffbeb; color: #92400e; border-color: #fcd34d; }
  .status-select.s-interested    { background: #ecfdf5; color: #065f46; border-color: #6ee7b7; }
  .status-select.s-not-interested{ background: #fef2f2; color: #991b1b; border-color: #fca5a5; }
  .status-select.s-follow-up     { background: #eff6ff; color: #1e40af; border-color: #93c5fd; }
  .status-select.s-closed-deal   { background: #f0fdf4; color: #14532d; border-color: #86efac; }
  .status-select.s-empty         { background: #f9fafb; color: var(--muted); }

  /* contact person */
  .contact-input {
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 0.82rem;
    background: transparent;
    width: 150px;
    transition: border-color .15s, background .15s;
    color: var(--text);
  }
  .contact-input:hover { border-color: var(--border); background: #fff; }
  .contact-input:focus { border-color: var(--primary); background: #fff; outline: none; }

  /* saved flash */
  .saved-flash { color: #27ae60; font-size: 0.72rem; margin-left: 6px; opacity: 0; transition: opacity .3s; }
  .saved-flash.show { opacity: 1; }

  /* empty state */
  .empty { text-align: center; padding: 48px; color: var(--muted); font-size: 0.9rem; }

  /* description tooltip */
  .desc-cell {
    max-width: 240px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted);
    font-size: 0.78rem;
    cursor: help;
  }
</style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
  <h1>Company Tracker</h1>
  <span id="last-updated"></span>
</header>

<div class="stats">
  <div class="stat-card"><div class="value" id="stat-total">—</div><div class="label">Total Companies</div></div>
  <div class="stat-card"><div class="value" id="stat-avg">—</div><div class="label">Avg Score</div></div>
  <div class="stat-card"><div class="value" id="stat-high">—</div><div class="label">Score ≥ 8</div></div>
  <div class="stat-card"><div class="value" id="stat-contacted">—</div><div class="label">Contacted</div></div>
  <div class="stat-card"><div class="value" id="stat-interested">—</div><div class="label">Interested</div></div>
  <div class="stat-card"><div class="value" id="stat-closed">—</div><div class="label">Closed Deals</div></div>
</div>

<div class="filters">
  <div class="filter-group">
    <label>Search</label>
    <input type="text" id="search" placeholder="Name, location, industry…" oninput="applyFilters()" />
  </div>
  <div class="filter-group">
    <label>Status</label>
    <select id="f-status" onchange="applyFilters()">
      <option value="">All statuses</option>
      {% for s in statuses %}
      <option value="{{ s }}">{{ s }}</option>
      {% endfor %}
      <option value="__empty__">— Not set —</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Field</label>
    <select id="f-field" onchange="applyFilters()">
      <option value="">All fields</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Potential Needs</label>
    <select id="f-needs" onchange="applyFilters()">
      <option value="">All needs</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Score range</label>
    <div class="score-wrap">
      <input type="number" id="f-score-min" min="1" max="10" placeholder="1" oninput="applyFilters()" />
      <span style="color:var(--muted)">–</span>
      <input type="number" id="f-score-max" min="1" max="10" placeholder="10" oninput="applyFilters()" />
    </div>
  </div>
  <button class="btn-reset" onclick="resetFilters()">Reset filters</button>
</div>

<div class="result-info" id="result-info"></div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('name')">Company <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('score')" class="sorted" id="th-score">Score <span class="sort-arrow">↓</span></th>
        <th onclick="sortBy('needs')">Potential Needs <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('location')">Location <span class="sort-arrow">↕</span></th>
        <th>Description</th>
        <th onclick="sortBy('status')">Status <span class="sort-arrow">↕</span></th>
        <th>Contact Person</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty" id="empty-state" style="display:none">No companies match the current filters.</div>
</div>

<script>
let ALL = [];
let sortKey = 'score';
let sortDir = -1; // -1 = desc

function scoreClass(s) {
  if (s >= 9) return 'score-high';
  if (s >= 7) return 'score-good';
  if (s >= 5) return 'score-mid';
  return 'score-low';
}

function statusClass(s) {
  const map = {
    'New': 's-new',
    'Contacted': 's-contacted',
    'Interested': 's-interested',
    'Not Interested': 's-not-interested',
    'Follow Up': 's-follow-up',
    'Closed Deal': 's-closed-deal',
  };
  return map[s] || 's-empty';
}

const STATUSES = {{ statuses | tojson }};

function statusOptions(current) {
  const opts = ['', ...STATUSES].map(s => {
    const sel = s === current ? 'selected' : '';
    return `<option value="${s}" ${sel}>${s || '— set status —'}</option>`;
  });
  return opts.join('');
}

function renderTable(data) {
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty-state');

  if (!data.length) {
    tbody.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = data.map(c => {
    const tags = c.needs
      ? c.needs.split(',').map(n => `<span class="tag">${n.trim()}</span>`).join('')
      : '<span style="color:var(--muted);font-size:.75rem">—</span>';

    const sc = statusClass(c.status);
    const desc = (c.description || '').replace(/"/g, '&quot;').replace(/\n/g, ' ');

    return `<tr>
      <td class="name-cell">
        <div><span class="field-badge">${c.field}</span></div>
        <a href="${c.url}" target="_blank">${c.name}</a>
        <div class="sub">${c.industry}</div>
      </td>
      <td style="text-align:center">
        <span class="score-pill ${scoreClass(c.score)}">${c.score}</span>
      </td>
      <td><div class="tags">${tags}</div></td>
      <td style="color:var(--muted);font-size:.8rem;white-space:nowrap">${c.location}</td>
      <td><div class="desc-cell" title="${desc}">${c.description || '—'}</div></td>
      <td>
        <select class="status-select ${sc}" data-row="${c.row}"
          onchange="updateStatus(this)">
          ${statusOptions(c.status)}
        </select>
        <span class="saved-flash" id="flash-${c.row}">✓ Saved</span>
      </td>
      <td>
        <input class="contact-input" data-row="${c.row}"
          value="${c.contact_person || ''}"
          placeholder="Add name…"
          onblur="updateContact(this)"
          onkeydown="if(event.key==='Enter')this.blur()" />
      </td>
    </tr>`;
  }).join('');
}

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  const fStatus = document.getElementById('f-status').value;
  const fField = document.getElementById('f-field').value;
  const fNeeds = document.getElementById('f-needs').value;
  const fMin = parseInt(document.getElementById('f-score-min').value) || 1;
  const fMax = parseInt(document.getElementById('f-score-max').value) || 10;

  let data = ALL.filter(c => {
    if (search && !`${c.name} ${c.location} ${c.industry} ${c.description}`.toLowerCase().includes(search)) return false;
    if (fStatus === '__empty__' && c.status) return false;
    if (fStatus && fStatus !== '__empty__' && c.status !== fStatus) return false;
    if (fField && c.field !== fField) return false;
    if (fNeeds && !c.needs.includes(fNeeds)) return false;
    if (c.score < fMin || c.score > fMax) return false;
    return true;
  });

  data = [...data].sort((a, b) => {
    let va = a[sortKey] ?? '';
    let vb = b[sortKey] ?? '';
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return -sortDir;
    if (va > vb) return sortDir;
    return 0;
  });

  document.getElementById('result-info').textContent =
    `Showing ${data.length} of ${ALL.length} companies`;

  renderTable(data);
}

function sortBy(key) {
  if (sortKey === key) {
    sortDir *= -1;
  } else {
    sortKey = key;
    sortDir = key === 'score' ? -1 : 1;
  }
  // update header arrows
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  const thMap = {score:'th-score'};
  if (thMap[key]) document.getElementById(thMap[key]).classList.add('sorted');
  applyFilters();
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('f-status').value = '';
  document.getElementById('f-field').value = '';
  document.getElementById('f-needs').value = '';
  document.getElementById('f-score-min').value = '';
  document.getElementById('f-score-max').value = '';
  applyFilters();
}

async function updateStatus(sel) {
  const row = sel.dataset.row;
  const value = sel.value;
  sel.className = `status-select ${statusClass(value)}`;
  await fetch(`/api/companies/${row}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({status: value})
  });
  // update local data
  const c = ALL.find(x => x.row == row);
  if (c) c.status = value;
  flashSaved(row);
  updateStats();
}

async function updateContact(input) {
  const row = input.dataset.row;
  const value = input.value.trim();
  await fetch(`/api/companies/${row}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({contact_person: value})
  });
  const c = ALL.find(x => x.row == row);
  if (c) c.contact_person = value;
  flashSaved(row);
}

function flashSaved(row) {
  const el = document.getElementById(`flash-${row}`);
  if (!el) return;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

function updateStats() {
  document.getElementById('stat-total').textContent = ALL.length;
  const scores = ALL.map(c => c.score).filter(Boolean);
  document.getElementById('stat-avg').textContent =
    scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : '—';
  document.getElementById('stat-high').textContent = ALL.filter(c => c.score >= 8).length;
  document.getElementById('stat-contacted').textContent = ALL.filter(c => c.status === 'Contacted').length;
  document.getElementById('stat-interested').textContent = ALL.filter(c => c.status === 'Interested').length;
  document.getElementById('stat-closed').textContent = ALL.filter(c => c.status === 'Closed Deal').length;
}

function populateDynamicFilters() {
  const fields = [...new Set(ALL.map(c => c.field).filter(Boolean))].sort();
  const fieldSel = document.getElementById('f-field');
  fields.forEach(f => {
    const o = document.createElement('option');
    o.value = f; o.textContent = f;
    fieldSel.appendChild(o);
  });

  const allNeeds = new Set();
  ALL.forEach(c => c.needs.split(',').forEach(n => { if (n.trim()) allNeeds.add(n.trim()); }));
  const needsSel = document.getElementById('f-needs');
  [...allNeeds].sort().forEach(n => {
    const o = document.createElement('option');
    o.value = n; o.textContent = n;
    needsSel.appendChild(o);
  });
}

async function init() {
  const res = await fetch('/api/companies');
  ALL = await res.json();
  populateDynamicFilters();
  updateStats();
  applyFilters();
  document.getElementById('last-updated').textContent =
    `${ALL.length} companies loaded`;
}

init();
</script>
</body>
</html>
